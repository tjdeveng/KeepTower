name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Generate changelog
      id: changelog
      run: |
        if [ -f CHANGELOG.md ]; then
          CHANGELOG_VERSION="${{ steps.get_version.outputs.version }}"
          CHANGELOG_VERSION="${CHANGELOG_VERSION#v}"
          # Extract changelog for this version
          awk "/^## \\[${CHANGELOG_VERSION}\\]/ {flag=1; next} /^## \\[/ {flag=0} flag" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details" > release-notes.md
          fi
        else
          echo "Release ${{ steps.get_version.outputs.version }}" > release-notes.md
        fi

    - name: Create Release
      id: create_release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PRERELEASE=""
        if [[ "${{ steps.get_version.outputs.version }}" == *"beta"* ]] || \
           [[ "${{ steps.get_version.outputs.version }}" == *"alpha"* ]] || \
           [[ "${{ steps.get_version.outputs.version }}" == *"rc"* ]]; then
          PRERELEASE="--prerelease"
        fi

        gh release create "${{ steps.get_version.outputs.version }}" \
          --title "KeepTower ${{ steps.get_version.outputs.version }}" \
          --notes-file release-notes.md \
          $PRERELEASE

        # Get upload URL for artifacts
        UPLOAD_URL=$(gh api repos/${{ github.repository }}/releases/tags/${{ steps.get_version.outputs.version }} --jq .upload_url)
        echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT

  build-release-artifacts:
    name: Build ${{ matrix.artifact }}
    needs: create-release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        artifact: [ubuntu-24.04, fedora-41, appimage, source]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          meson \
          ninja-build \
          pkg-config \
          libgtkmm-4.0-dev \
          libprotobuf-dev \
          protobuf-compiler \
          libssl-dev \
          libgtest-dev \
          doxygen \
          graphviz \
          cmake \
          git \
          wget \
          gettext \
          desktop-file-utils

        # Try to install YubiKey and Argon2 dependencies (may not be available in all Ubuntu versions)
        sudo apt-get install -y libfido2-dev libargon2-dev || echo "Warning: Optional dependencies not available"

    - name: Build and install libcorrect
      run: |
        git clone https://github.com/quiet/libcorrect.git /tmp/libcorrect
        cd /tmp/libcorrect
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr ..
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Build binary for ${{ matrix.artifact }}
      if: matrix.artifact != 'source' && matrix.artifact != 'appimage'
      run: |
        meson setup build --buildtype=release --prefix=/usr
        meson compile -C build

        # Set up test environment
        export GSETTINGS_SCHEMA_DIR=\"${{ github.workspace }}/build/data\"
        ulimit -l 10240 2>/dev/null || echo \"Warning: Could not increase memory lock limit\"

        # Install xvfb for headless GTK tests
        sudo apt-get install -y xvfb

        # Run tests with xvfb and timeout multiplier for crypto tests
        # Disable YubiKey detection to prevent libfido2 device enumeration issues
        export DISABLE_YUBIKEY_DETECT=1
        xvfb-run -a meson test -C build --print-errorlogs --timeout-multiplier 1.5

        mkdir -p dist/keeptower-${{ needs.create-release.outputs.version }}-${{ matrix.artifact }}-x86_64
        cp build/src/keeptower dist/keeptower-${{ needs.create-release.outputs.version }}-${{ matrix.artifact }}-x86_64/
        cp README.md LICENSE CHANGELOG.md dist/keeptower-${{ needs.create-release.outputs.version }}-${{ matrix.artifact }}-x86_64/

        cd dist
        tar -czf keeptower-${{ needs.create-release.outputs.version }}-${{ matrix.artifact }}-x86_64.tar.gz \
          keeptower-${{ needs.create-release.outputs.version }}-${{ matrix.artifact }}-x86_64/
        mv keeptower-${{ needs.create-release.outputs.version }}-${{ matrix.artifact }}-x86_64.tar.gz ..
        cd ..

    - name: Build AppImage
      if: matrix.artifact == 'appimage'
      run: |
        meson setup build --buildtype=release --prefix=/usr
        meson compile -C build
        DESTDIR=$PWD/AppDir meson install -C build

        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage

        # Try to run linuxdeploy directly (may work on GitHub runners)
        # Skip stripping due to Fedora 41 RELR format incompatibility
        # TODO: Monitor https://github.com/linuxdeploy/linuxdeploy/releases
        #       Remove NO_STRIP=1 when linuxdeploy supports RELR relocations (binutils 2.38+)
        #       to reduce AppImage size by ~5-10%
        NO_STRIP=1 ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --executable AppDir/usr/bin/keeptower \
          --desktop-file AppDir/usr/share/applications/com.tjdeveng.keeptower.desktop \
          --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/com.tjdeveng.keeptower.svg \
          --output appimage || {
            echo "Direct AppImage run failed, trying extraction method..."
            ./linuxdeploy-x86_64.AppImage --appimage-extract
            NO_STRIP=1 ./squashfs-root/AppRun \
              --appdir AppDir \
              --executable AppDir/usr/bin/keeptower \
              --desktop-file AppDir/usr/share/applications/com.tjdeveng.keeptower.desktop \
              --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/com.tjdeveng.keeptower.svg \
              --output appimage
          }

        # Find and rename the AppImage
        echo "Checking for AppImage files..."
        ls -lh *.AppImage

        if ls KeepTower*.AppImage 1> /dev/null 2>&1; then
          mv KeepTower*.AppImage keeptower-${{ needs.create-release.outputs.version }}-x86_64.AppImage
        elif ls keeptower*.AppImage 1> /dev/null 2>&1; then
          mv keeptower*.AppImage keeptower-${{ needs.create-release.outputs.version }}-x86_64.AppImage
        else
          echo "ERROR: No AppImage file found!"
          exit 1
        fi

        # Verify the final file exists
        if [ ! -f keeptower-${{ needs.create-release.outputs.version }}-x86_64.AppImage ]; then
          echo "ERROR: AppImage file not created successfully"
          exit 1
        fi

        ls -lh keeptower-${{ needs.create-release.outputs.version }}-x86_64.AppImage
        echo "AppImage created successfully"

    - name: Create source tarball
      if: matrix.artifact == 'source'
      run: |
        git archive --format=tar.gz \
          --prefix=keeptower-${{ needs.create-release.outputs.version }}/ \
          HEAD > keeptower-${{ needs.create-release.outputs.version }}-source.tar.gz

    - name: Generate checksums
      run: |
        sha256sum keeptower-* > checksums-${{ matrix.artifact }}.txt
        cat checksums-${{ matrix.artifact }}.txt

    - name: Upload Release Assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Determine artifact filename
        if [ "${{ matrix.artifact }}" = "source" ]; then
          ARTIFACT_FILE="keeptower-${{ needs.create-release.outputs.version }}-source.tar.gz"
        elif [ "${{ matrix.artifact }}" = "appimage" ]; then
          ARTIFACT_FILE="keeptower-${{ needs.create-release.outputs.version }}-x86_64.AppImage"
        else
          ARTIFACT_FILE="keeptower-${{ needs.create-release.outputs.version }}-${{ matrix.artifact }}-x86_64.tar.gz"
        fi

        # Upload artifact and checksums
        gh release upload "${{ needs.create-release.outputs.version }}" \
          "$ARTIFACT_FILE" \
          "checksums-${{ matrix.artifact }}.txt" \
          --clobber

  build-windows:
    name: Build Windows (MSYS2/MinGW64)
    needs: create-release
    runs-on: windows-latest
    # Windows build may fail until the full platform port is complete.
    # Remove continue-on-error once the build is consistently green.
    continue-on-error: true

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup MSYS2 / MinGW64
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-gtkmm-4.0
          mingw-w64-x86_64-protobuf
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-libfido2
          mingw-w64-x86_64-argon2
          mingw-w64-x86_64-gtest
          mingw-w64-x86_64-gettext
          zip
          git

    - name: Build libcorrect from source
      run: |
        git clone --depth 1 https://github.com/quiet/libcorrect.git /tmp/libcorrect
        cd /tmp/libcorrect
        mkdir build && cd build
        cmake -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/mingw64 \
              ..
        ninja
        ninja install

    - name: Configure build
      run: meson setup build --buildtype=release --prefix=/mingw64

    - name: Build
      run: meson compile -C build

    - name: Run tests
      run: |
        export DISABLE_YUBIKEY_DETECT=1
        meson test -C build --no-rebuild --print-errorlogs --timeout-multiplier 2 || \
          echo "Some tests failed — see log above (non-blocking for packaging)"

    - name: Collect runtime DLLs
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"
        DIST="keeptower-${VERSION}-windows-x86_64"
        mkdir -p "${DIST}"

        # Copy the built executable
        cp build/src/keeptower.exe "${DIST}/" 2>/dev/null || \
          cp build/src/keeptower   "${DIST}/" 2>/dev/null || \
          { echo "ERROR: keeptower executable not found"; exit 1; }

        # Bundle required MinGW64 DLLs so the package is self-contained
        MINGW_BIN=/mingw64/bin
        for dll in \
          libgcc_s_seh-1.dll \
          libstdc++-6.dll \
          libwinpthread-1.dll \
          libcrypto-3-x64.dll \
          libssl-3-x64.dll \
          libprotobuf-32.dll \
          libfido2-1.dll \
          libargon2.dll \
          libgtkmm-4.0-0.dll \
          libglib-2.0-0.dll \
          libgobject-2.0-0.dll \
          libgio-2.0-0.dll \
          libgdk_pixbuf-2.0-0.dll \
          libpango-1.0-0.dll \
          libpangocairo-1.0-0.dll \
          libcairo-2.dll \
          libgtk-4-1.dll \
          libadwaita-1-0.dll \
          libcorrect.dll; do
          [ -f "${MINGW_BIN}/${dll}" ] && cp "${MINGW_BIN}/${dll}" "${DIST}/" || \
            echo "Note: ${dll} not found (may be statically linked or named differently)"
        done

        # Copy docs
        cp README.md LICENSE CHANGELOG.md "${DIST}/"

        # Create ZIP archive
        zip -r "keeptower-${VERSION}-windows-x86_64.zip" "${DIST}/"
        sha256sum "keeptower-${VERSION}-windows-x86_64.zip" > "checksums-windows.txt"
        echo "=== Package contents ==="
        ls -lh "${DIST}/"
        echo "=== Archive ==="
        ls -lh "keeptower-${VERSION}-windows-x86_64.zip"

    - name: Upload Windows release assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"
        gh release upload "${VERSION}" \
          "keeptower-${VERSION}-windows-x86_64.zip" \
          "checksums-windows.txt" \
          --clobber

  build-documentation:
    name: Build and Deploy Documentation
    needs: create-release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Cache Doxygen
      id: cache-doxygen
      uses: actions/cache@v5
      with:
        path: /tmp/doxygen-install
        key: doxygen-${{ runner.os }}-${{ hashFiles('.github/doxygen-version.txt') }}
        restore-keys: |
          doxygen-${{ runner.os }}-

    - name: Install documentation dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl graphviz

    - name: Install pinned Doxygen
      run: bash scripts/install-doxygen.sh /tmp/doxygen-install /tmp/doxygen-download

    - name: Expose Doxygen on PATH
      run: echo "/tmp/doxygen-install/bin" >> $GITHUB_PATH

    - name: Generate documentation
      run: bash scripts/run-doxygen.sh

    - name: Package documentation
      run: |
        DOCS_ARCHIVE="$GITHUB_WORKSPACE/keeptower-${{ needs.create-release.outputs.version }}-docs.tar.gz"
        cd build/docs/api
        tar -czf "$DOCS_ARCHIVE" html/

    - name: Upload Documentation Asset
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        DOCS_ARCHIVE="$GITHUB_WORKSPACE/keeptower-${{ needs.create-release.outputs.version }}-docs.tar.gz"
        gh release upload ${{ needs.create-release.outputs.version }} \
          "$DOCS_ARCHIVE" \
          --clobber
