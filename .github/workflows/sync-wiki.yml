#
# GitHub Actions workflow to sync documentation from main repo to Wiki
#
# This workflow maintains a single source of truth for documentation:
# - Source: docs/user/ in main repository
# - Target: GitHub Wiki repository
# - Trigger: Changes to docs/user/ files
#
# Security: Uses GitHub token with wiki write permissions

name: Sync Documentation to Wiki

on:
  push:
    branches:
      - master
    paths:
      - 'docs/user/**'
      - 'docs/developer/CONTRIBUTING.md'
  workflow_dispatch:  # Allow manual triggering

jobs:
  sync-wiki:
    name: Sync Docs to Wiki
    runs-on: ubuntu-24.04

    permissions:
      contents: write  # Required for wiki access

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync documentation files
        run: |
          # Extract version from meson.build (single source of truth)
          VERSION=$(grep "version:" meson.build | head -1 | sed "s/.*version: '\(.*\)'.*/\1/")
          echo "Detected version: v$VERSION"

          obsolete_pages=(
            "Faq.md"
            "GettingStarted.md"
            "UserGuide.md"
            "VaultSecurityAlgorithms.md"
          )

          # User documentation (auto-discover all numbered files)
          # Converts known docs/user files to canonical GitHub Wiki page names.
          for file in docs/user/[0-9][0-9]-*.md; do
            if [ -f "$file" ]; then
              basename=$(basename "$file" .md)

              case "$basename" in
                "00-home")
                  wikiname="Home"
                  ;;
                "01-getting-started")
                  wikiname="Getting-Started"
                  ;;
                "02-installation")
                  wikiname="Installation"
                  ;;
                "03-user-guide")
                  wikiname="User-Guide"
                  ;;
                "04-faq")
                  wikiname="FAQ"
                  ;;
                "05-security")
                  wikiname="Security"
                  ;;
                "06-vault-security-algorithms")
                  wikiname="Vault-Security-Algorithms"
                  ;;
                *)
                  echo "Skipping unknown wiki source file: $basename.md"
                  continue
                  ;;
              esac

              echo "Syncing: $basename.md → $wikiname.md"
              # Substitute @VERSION@ with actual version from meson.build
              sed "s/@VERSION@/v$VERSION/g" "$file" > "wiki/${wikiname}.md"
            fi
          done

          # Remove stale legacy wiki page names left over from older sync schemes.
          for page in "${obsolete_pages[@]}"; do
            if [ -f "wiki/$page" ]; then
              rm "wiki/$page"
              echo "Removed obsolete wiki page: $page"
            fi
          done

          # Additional user documentation (non-numbered files)
          if [ -f docs/user/README.md ]; then
            sed "s/@VERSION@/v$VERSION/g" docs/user/README.md > wiki/README.md
            echo "Synced: README.md"
          fi
          if [ -f docs/user/SECURITY_BEST_PRACTICES.md ]; then
            sed "s/@VERSION@/v$VERSION/g" docs/user/SECURITY_BEST_PRACTICES.md > wiki/Security-Best-Practices.md
            echo "Synced: Security-Best-Practices.md"
          fi
          if [ -f docs/user/YUBIKEY_FIPS_SETUP.md ]; then
            sed "s/@VERSION@/v$VERSION/g" docs/user/YUBIKEY_FIPS_SETUP.md > wiki/YubiKey-FIPS-Setup.md
            echo "Synced: YubiKey-FIPS-Setup.md"
          fi

          # Developer documentation
          cp docs/developer/CONTRIBUTING.md wiki/Contributing.md
          echo "Synced: Contributing.md"

          # Add sync timestamp footer to each file
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          for file in wiki/*.md; do
            if ! grep -q "Last synced:" "$file"; then
              echo "" >> "$file"
              echo "---" >> "$file"
              echo "*Last synced: $TIMESTAMP*" >> "$file"
            else
              sed -i "s/Last synced:.*/Last synced: $TIMESTAMP*/" "$file"
            fi
          done

      - name: Commit and push to wiki
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to wiki documentation"
            exit 0
          fi

          git add .
          git commit -m "Sync documentation from main repository

          Automated sync triggered by commit ${{ github.sha }}
          Source: docs/user/ and docs/developer/
          Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          git push origin master

      - name: Summary
        if: success()
        run: |
          echo "✅ Wiki documentation successfully synced"
          echo "📚 Files synced from docs/user/ and docs/developer/"
          echo ""
          echo "Synced files:"
          ls -1 wiki/*.md | sed 's|wiki/||' | sed 's/^/  - /'
